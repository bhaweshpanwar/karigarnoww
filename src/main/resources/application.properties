spring.datasource.url=jdbc:postgresql://localhost:5432/karigarnow
spring.datasource.username=postgres
spring.datasource.password=Bhawesh@123

# Database Connection Pooling (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=KarigarNowHikariPool

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Minimal Logging
logging.level.root=WARN
logging.level.com.karigarnow=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

server.port=8080

jwt.secret=karigarnow-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long
jwt.expiration=86400000
